name: Identity Vault CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff lint
        env:
          PYTHONPATH: .
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///./identity_vault_test.db
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          SECRET_KEY: test-secret-key
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run backend tests
        env:
          PYTHONPATH: .
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///./identity_vault_test.db
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          SECRET_KEY: test-secret-key
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
        run: pytest

      - name: Verify FastAPI app imports
        env:
          PYTHONPATH: .
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///./identity_vault_test.db
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          SECRET_KEY: test-secret-key
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://identity-vault-api.onrender.com
        run: npm run build